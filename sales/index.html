    <style>
      :root {
        color-scheme: light;
        --ink: #101214;
        --muted: #6e747b;
        --paper: #ffffff;
        --wash: #f5f5f7;
        --blue: #006edb;
        --line: #d9dde2;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--wash);
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--wash);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(520px, calc(100% - 40px));
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--paper);
      }

      img {
        display: block;
        width: 40px;
        height: 40px;
        margin-bottom: 24px;
        border: 1px solid #eceff2;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.14;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        padding: 10px 14px;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
